# Configuration for cargo-deny
# See: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]
# The lint level for unmaintained crates.
unmaintained = "all"
# The lint level for crates that have been yanked from their source registry
yanked = "deny"
# A list of advisory IDs to ignore
ignore = [
    # proc-macro-error2 (build-time proc-macro) is unmaintained; pulled in by
    # validator_derive 0.20, the latest published version. No upstream fix yet.
    "RUSTSEC-2026-0173",
    # quick-xml DoS advisories (fix requires >=0.41); pulled in transitively by
    # object_store 0.14 for its AWS/Azure XML list parsing. The latest released
    # object_store still caps quick-xml at 0.40 — no upstream release to bump to
    # yet. Remove once object_store ships a quick-xml >=0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # Unmaintained crates pulled in transitively by the engine's codec stack
    # (elide-codec): paste via its macros, ttf-parser via ab_glyph/imageproc
    # text rendering. Both are advisory-only (not vulnerabilities) and vetted
    # upstream in elide. Remove if elide drops them.
    "RUSTSEC-2024-0436",
    "RUSTSEC-2026-0192",
]

[licenses]
# Confidence threshold for detecting a license from a license text (higher = stricter)
confidence-threshold = 0.8
# Private licenses are not allowed
private = { ignore = false, registries = [] }
# Warn if an allowed license is not used in the dependency graph
unused-allowed-license = "warn"

# List of explicitly allowed licenses (single licenses only)
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "BSL-1.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
    "bzip2-1.0.6",
    "CDLA-Permissive-2.0",
    # Weak copyleft; pulled in transitively by the engine's HTML codec
    # (cssparser, selectors) and audio codecs (symphonia). File-level
    # copyleft only — using these crates as-is does not affect our source.
    "MPL-2.0",
]

# LGPL-3.0, accepted only for the engine's opt-in `mp3` codec feature.
# MP3 *encoding* has no permissively-licensed, production-quality alternative
# in the ecosystem — LAME (libmp3lame) is effectively the only option, and
# every substitute (incl. Shine) is also LGPL. The obligation is satisfiable
# for proprietary use via dynamic/separate linking. Mirrors the carve-out in
# the upstream elide repository.
exceptions = [
    { name = "mp3lame-encoder", allow = ["LGPL-3.0"] },
    { name = "mp3lame-sys", allow = ["LGPL-3.0"] },
]

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`
wildcards = "deny"
# First-party git/path dependencies (nvisy-engine, nvisy-schema) are pinned by
# git ref, not a version requirement, so their `*` is not a real wildcard.
allow-wildcard-paths = true
# The graph highlighting used when creating dotgraphs for crates with multiple versions
highlight = "all"

# List of crates that are allowed
allow = []

# List of crates to deny - focus on actual security/legal issues
deny = [
    # Prefer rustls over OpenSSL for security and licensing simplicity
    { name = "openssl-sys", version = "*" },
    { name = "openssl", version = "*" },
]

# Skip checking certain crates that are known to have complex but acceptable licensing
skip = []
skip-tree = []

[sources]
# Lint level for what to happen when a crate from a crate registry that is not in the allow list
unknown-registry = "deny"
# Lint level for what to happen when a crate from a git repository that is not in the allow list
unknown-git = "deny"
# List of URLs for allowed crate registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# List of URLs for allowed Git repositories
allow-git = [
    "https://github.com/nvisycom/runtime",
    "https://github.com/nvisycom/elide",
]
